# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET
permissions:
  contents: write

on:
  push:
    branches: [master]
  release:
    types: [published]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Build
      run: |
        dotnet publish --configuration Release --os win -p:PublishSingleFile=true -p:PublishTrimmed=true
        cp bin/Release/net8.0/win-x64/publish/nav2wpt.exe nav2wpt.exe
        zip -rj waypoints-foxbot.zip waypoints/foxbot
        zip -rj waypoints-marine_bot.zip waypoints/marine_bot
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: publish
        path: |
          nav2wpt.exe
          waypoints-foxbot.zip
          waypoints-marine_bot.zip
          
    - name: Publish artifacts
      uses: softprops/action-gh-release@v2
      if: |
        startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          nav2wpt.exe
          waypoints-foxbot.zip
          waypoints-marine_bot.zip
      env:
        GITHUB_TOKEN: ${{ secrets.API_TOKEN }}
